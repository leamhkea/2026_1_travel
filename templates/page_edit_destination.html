{% include "_header.html" %}

<main>
  <h1>Edit travel destination</h1>

  <form
    id="formDestination"
    mix-patch="/api-update-destination/{{ destination.destination_pk }}"
    autocomplete="off"
  >
    <div id="tooltip"></div>

    <!-- Container for title -->
    <div class="div_formfield">
      <label>
        Title
        <span
          >{{ x.DESTINATION_TITLE_MIN }} to {{ x.DESTINATION_TITLE_MAX }}
          characters</span
        >
      </label>
      <input
        id="title"
        name="destination_title"
        type="text"
        value="{{ destination.destination_title }}"
        mix-validate="{{ x.REGEX_DESTINATION_TITLE }}"
      />
    </div>

    <!-- Container for country -->
    <div class="div_formfield">
      <label>
        Country
        <span
          >{{ x.DESTINATION_COUNTRY_MIN }} to {{ x.DESTINATION_COUNTRY_MAX }}
          characters</span
        >
      </label>
      <input
        id="country"
        name="destination_country"
        type="text"
        value="{{ destination.destination_country }}"
        mix-validate="{{ x.REGEX_DESTINATION_COUNTRY }}"
      />
    </div>

    <!-- Container for location -->
    <div class="div_formfield">
      <label>
        Location
        <span
          >{{ x.DESTINATION_LOCATION_MIN }} to {{ x.DESTINATION_LOCATION_MAX }}
          characters</span
        >
      </label>
      <input
        id="location"
        name="destination_location"
        type="text"
        value="{{ destination.destination_location }}"
        mix-validate="{{ x.REGEX_DESTINATION_LOCATION }}"
      />
    </div>

    <!-- Container for description -->
    <div class="div_formfield">
      <label>Description</label>
      <textarea id="description" name="destination_description">
{{ destination.destination_description }}</textarea
      >
    </div>

    <!-- Container for date from -->
    <div class="div_formfield">
      <label>Date from</label>
      <input
        id="datefrom"
        name="destination_date_from"
        type="date"
        value="{{ destination.destination_date_from }}"
      />
    </div>

    <!-- Container for date to -->
    <div class="div_formfield">
      <label>Date to</label>
      <input
        id="dateto"
        name="destination_date_to"
        type="date"
        value="{{ destination.destination_date_to }}"
      />
    </div>

    <ul id="errors"></ul>
    <button>Update destination</button>
  </form>
</main>

{% include "_footer.html" %}

<script type="module" src="/dist/edit_destination.js"></script>
